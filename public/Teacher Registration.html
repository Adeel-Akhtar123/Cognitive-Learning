<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registration Form</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

.main{
  width:100%;
  min-height:calc(100vh - 60px);
  display:flex;
  padding:20px;
  gap:10px;
  align-items:stretch;

  padding-top:80px; 
}


.left,
.right{
  min-height:100%;
}
/* CARD */
.card{
  background:rgb(6, 24, 75);
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(5, 28, 71, 0.05);
}

/* LEFT */
.left{
  
  width:35%;
  display:flex;
  flex-direction:column;
  gap:15px;
  justify-content:space-between;
}


.left input,
.left textarea{
  margin-top: 10px;
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
}

/* RIGHT */
.right{
  width:65%;
  display:flex;
  flex-direction:column;
  gap:0px;
  overflow:auto;
}

input[type="date"]{
  width:100%;
  height:30px;
}

h2{
  text-align:center;
  color:#dde1e7;
}

/* PROFILE */
.profileBox{
  display:flex;
  flex-direction:column;   /* stack vertically */
  align-items:flex-end;    /* keep to RIGHT */
  justify-content:flex-start;
  width:100%;
gap: 2px;;
}
#photoPreview{
  width:80px;
  height:100px;
  object-fit:cover;
  border:2px solid #ccc;
  margin-right:10px;
}

.hidden{display:none;}

#profileBtn{
  padding:8px 12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th,td{
  border:1px solid #ddd;
  text-align:center;
  padding:5px;
}

th{
  background:#0b3a66;
  color:white;
}

.day{
  background:#eef2ff;
  font-weight:bold;
}

.time-btn{
  width:100%;
  padding:5px;
  border:none;
  background:#93c5fd;
  border-radius:4px;
  font-size:11px;
  cursor:pointer;
}

.bg-green-600{background:#16a34a !important;color:white;}
.bg-blue-300{background:#93c5fd;}

select{
  width:100%;
  margin-top:5px;
  font-size:11px;
}

.submitBtn{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.error{
  color:red;
  font-size:13px;
}
input[type="radio"]{
   
  transform: scale(0.7); /* change value to control size */
  margin-right:5px;
  cursor:pointer;
}
 .modeBox {
  margin-top: 10px; 
  font-size: small;
  color: #ccc;
}
.section-title{
  margin-bottom:5px;;
   color:#dde1e7;
  font-size:14px;
  

  
}
.topRow{
  display:flex;
  align-items:center;
  margin-top:10px;
}

/* LEFT side */
.modeBox{
  width:40%;
}

/* CENTER title */
.scheduleTitle{
  width:70%;
  text-align:center;
  font-weight:bold;
  font-size:14px;
  color:#dde1e7;
}
.selected-bar{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin:10px 0;
}

.slot-tag{
  background:#2563eb;
  color:white;
  padding:5px 8px;
  border-radius:5px;
  font-size:11px;
}
.form-group{
  display:flex;
  flex-direction:column;
  gap:15px;
  height:100%;
}
/* 📱 MOBILE RESPONSIVE */
@media (max-width: 768px){

  .main{
    flex-direction:column;
    padding:10px;
  }

  .left{
    width:100%;
    padding-top:80px;
  }
.right{
      width:100%;
}
  

  .topRow{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

  .modeBox{
    width:100%;
  }

  .scheduleTitle{
    width:100%;
    text-align:center;
    font-size: medium;
  }

  table{
    font-size:10px;
  }

  .time-btn{
    font-size:9px;
    padding:4px;
  }

  .submitBtn{
    font-size:14px;
  }
}
#menuBtn {
  display: none;
}

@media (max-width: 768px) {
  #menuBtn {
    display: block;
  }@media (max-width:768px){

  .date-section{
    width:100%;
    align-items:center;
  }

  .date-section input[type="date"]{
    width:90%;
    max-width:300px;
  }

}

  #menu {
    display: none;
  }
  
}
 .logo-container {
  display: flex;
  align-items: center;
  gap: 10px; 
}

.logo-img {
  height:80px;
  width: auto;
}

.logo-text {
  font-weight: bold;
  font-size:14px;
  line-height: 1.2;
  color:#000;
}
/* NAV LINKS */
nav a {
  color: #111;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  padding: 8px 14px;
  border-radius: 8px;
  transition: all 0.3s ease;
  position: relative;
}

/* HOVER EFFECT */
nav a:hover {
  background: rgba(0, 123, 255, 0.12);
  color: #007bff;
  transform: translateY(-1px);
}

/* ACTIVE LOOK (optional) */
nav a:active {
  transform: scale(0.97);
}
.date-title{
  text-align:center;
  width:100%;
}
.date-section{
  display:flex;
  flex-direction:column;
  align-items:center;
}


input[type="date"]{
  text-align:center;
}
.subject-buttons,
.grade-buttons{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  margin-top:4px;
}

.subject-btn,
.grade-btn{
  border:none;
  border-radius:4px;
  padding:3px 6px;
  font-size:10px;
  cursor:pointer;
  background:#93c5fd;
}

.subject-btn.active,
.grade-btn.active{
  background:#16a34a;
  color:white;
}.table-wrapper{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.date-section input[type="date"]::-webkit-datetime-edit-fields-wrapper{
  display:flex;
  justify-content:center;
}

.table-wrapper table{
  min-width:700px;
}
</style>
</head>

<body>
<header class="fixed top-0 left-0 w-full bg-white z-50 flex items-center justify-between px-4 h-[70px]">
  <div class="logo-container">
  <img src="Image/logo_CLC-removebg-preview.png" class="logo-img">
  <span class="logo-text">
    Cognitive<br>Learning
  </span>
</div>
  <!-- HAMBURGER -->
  <button id="menuBtn" class="md:hidden text-2xl">
    ☰
  </button>

  <!-- NAV LINKS -->
  <nav id="menu" class="hidden md:flex gap-6 font-semibold">
    <a href="index.html">Home</a>
     <a href="Faculty.html">Faculty</a>
      <a href="Student Registration form.html">Student Registration</a>
  </nav>

</header>
<div id="mobileMenu" class="hidden fixed top-16 left-0 w-full bg-white shadow flex flex-col items-center gap-4 py-5 z-40">
  <a href="index.html">Home</a>
   <a href="Faculty.html">Faculty</a>
    <a href="Student Registration form.html">Student Registration</a>
</div>
<!-- MAIN -->
<div class="main">
 <form
  id="teacherForm"
  enctype="multipart/form-data"
  style="display:contents;"
>

    <!-- LEFT -->
    <div class="left card">

  <div class="form-group">

    <input
      type="text"
      name="fullName"
      placeholder="Full Name *"
      required
    >

    <input
      type="email"
      name="email"
      placeholder="Email *"
      required
    >

    <input
      type="text"
      name="contact"
      placeholder="Contact *"
      required
    >

    <textarea
      name="address"
      placeholder="Address *"
      required
    ></textarea>

    <input
      type="text"
      name="qualification"
      placeholder="Qualification *"
      required
    >

    <input
      type="text"
      name="experience"
      placeholder="Experience"
    >

  </div>

</div>

    <!-- RIGHT -->
    <div class="right card">
       <h2>Registration Form</h2>


      <!-- PROFILE -->
      <div class="profileBox">
       <input
  type="file"
  id="photo"
  name="profileImage"
  class="hidden"
  accept="image/*"
>
        <img id="photoPreview" class="hidden" />
        <button type="button" id="profileBtn">Upload Picture</button>
      </div>

    <div class="topRow">

  <!-- LEFT -->
  <div class="modeBox">
    <div class="section-title">Teaching Mode *</div>
    <label><input type="radio" name="mode" value="online"> Online</label>
    <label><input type="radio" name="mode" value="onsite"> On Site</label>
  </div>

  <!-- RIGHT (ONLY TITLE) -->
  
    <div class="section-title">Preferred Teaching Schedule *</div>
  

</div>

<!-- TABLE STAYS BELOW -->
<div id="selectedSlots" class="selected-bar"></div>

<table>
          <thead>
            <tr>
              <th>Day</th>
              <th colspan="6">Time Slots</th>
            </tr>
          </thead>
          <tbody id="schedule"></tbody>
        </table>
      
        <div class="date-section">
  <div class="section-title date-title">
    Preferred Start Date *
  </div>

 <input
  type="date"
  name="startDate"
  required
>
</div>

      <div id="scheduleError" class="error"></div>

      <button class="submitBtn" type="submit">Submit Form</button>

    </div>

  </form>

</div>

<script>
const API_BASE = "https://cognitive-learning-backend.vercel.app/api/teachers";
/* ======================================
   PHOTO UPLOAD
====================================== */

const photo = document.getElementById("photo");
const photoPreview = document.getElementById("photoPreview");
const profileBtn = document.getElementById("profileBtn");

if (profileBtn && photo) {
  profileBtn.addEventListener("click", () => photo.click());
}

if (photo) {
  photo.addEventListener("change", () => {
    if (!photo.files.length || !photoPreview) return;

    const reader = new FileReader();

    reader.onload = (e) => {
      photoPreview.src = e.target.result;
      photoPreview.classList.remove("hidden");
    };

    reader.readAsDataURL(photo.files[0]);
  });
}

/* ======================================
   DATA
====================================== */

const scheduleBody = document.getElementById("schedule");

const days = [
  "Monday",
  "Tuesday",
  "Wednesday",
  "Thursday",
  "Friday",
  "Saturday"
];

const times = [
  "2:00pm–3:00pm",
  "3:00pm–4:00pm",
  "4:00pm–5:00pm",
  "5:00pm–6:00pm",
  "6:00pm–7:00pm",
  "7:00pm–8:00pm"
];

const subjectGrades = {
  Mathematics: ["IGCSE", "O Level", "AS Level", "A2 Level"],
  Physics: ["IGCSE", "O Level", "AS Level", "A2 Level"],
  Chemistry: ["IGCSE", "O Level", "AS Level", "A2 Level"],
  "Computer Science": ["IGCSE", "O Level", "AS Level", "A2 Level"],
  Urdu: ["IGCSE", "O Level", "AS Level", "A2 Level"]
};

/* ======================================
   SLOT STATES
====================================== */

// Approved slots from database
let reservedSlots = {};

// Current teacher selections
let selectedSlots = {};

/* ======================================
   LOAD RESERVED SLOTS
====================================== */

async function loadReservedSlots() {
  try {
    const res = await fetch(`${API_BASE}/api/reserved-slots`);

    reservedSlots = await res.json();

    buildTable();

  } catch (err) {
    console.error("Failed to load reserved slots", err);
  }
}

/* LIVE REFRESH */

setInterval(loadReservedSlots, 300000); // 5 minutes

/* ======================================
   BUILD TABLE
====================================== */

function buildTable() {

  if (!scheduleBody) return;

  scheduleBody.innerHTML = "";

  days.forEach(day => {

    const tr = document.createElement("tr");

    let html = `<td class="day">${day}</td>`;

    times.forEach(time => {

      const key = `${day}-${time}`;

      const slotInfo = reservedSlots[key];

      const isReserved = !!slotInfo;

      html += `
        <td>

          <button
            type="button"
            ${isReserved ? "disabled" : ""}
            class="time-btn ${
              isReserved
                ? "bg-green-600 opacity-70 cursor-not-allowed"
                : "bg-blue-300"
            }"
            data-day="${day}"
            data-time="${time}">

            ${
              isReserved
                ? `
                  <div>${time}</div>
                  <div>${slotInfo.subject || ""}</div>
                  <div>${slotInfo.grade || ""}</div>
                  <div style="font-size:9px;">RESERVED</div>
                `
                : time
            }

          </button>

          <div class="selection hidden">

            <div class="subject-buttons">

              ${Object.keys(subjectGrades)
                .map(
                  subject => `
                    <button
                      type="button"
                      class="subject-btn">
                      ${subject}
                    </button>
                  `
                )
                .join("")}

            </div>

            <div class="grade-buttons hidden"></div>

          </div>

        </td>
      `;
    });

    tr.innerHTML = html;

    scheduleBody.appendChild(tr);
  });
}

/* ======================================
   RESET SELECTION
====================================== */

function resetSelection(selection) {

  if (!selection) return;

  delete selection.dataset.subject;

  selection
    .querySelectorAll(".subject-btn")
    .forEach(btn => btn.classList.remove("active"));

  const gradeBox = selection.querySelector(".grade-buttons");

  gradeBox.innerHTML = "";

  gradeBox.classList.add("hidden");
}

/* ======================================
   CLICK HANDLER
====================================== */

document.addEventListener("click", (e) => {

  const timeBtn = e.target.closest(".time-btn");
  const subjectBtn = e.target.closest(".subject-btn");
  const gradeBtn = e.target.closest(".grade-btn");

  /* SLOT CLICK */

  if (timeBtn) {

    const day = timeBtn.dataset.day;
    const time = timeBtn.dataset.time;

    const key = `${day}-${time}`;

    // BLOCK RESERVED SLOT FOREVER

    if (reservedSlots[key]) {
      return;
    }

    const selection = timeBtn.nextElementSibling;

    document
      .querySelectorAll(".selection")
      .forEach(s => {
        if (s !== selection) {
          s.classList.add("hidden");
        }
      });

    selection.classList.toggle("hidden");
  }

  /* SUBJECT CLICK */

  if (subjectBtn) {

    const selection = subjectBtn.closest(".selection");

    selection
      .querySelectorAll(".subject-btn")
      .forEach(btn => btn.classList.remove("active"));

    subjectBtn.classList.add("active");

    const subject = subjectBtn.textContent.trim();

    selection.dataset.subject = subject;

    const gradeBox = selection.querySelector(".grade-buttons");

    gradeBox.innerHTML = subjectGrades[subject]
      .map(
        grade =>
          `<button type="button" class="grade-btn">${grade}</button>`
      )
      .join("");

    gradeBox.classList.remove("hidden");
  }

  /* GRADE CLICK */

  if (gradeBtn) {

    const selection = gradeBtn.closest(".selection");

    const subject = selection.dataset.subject;

    const grade = gradeBtn.textContent.trim();

    const btn = selection.previousElementSibling;

    const day = btn.dataset.day;
    const time = btn.dataset.time;

    const key = `${day}-${time}`;

    selectedSlots[key] = {
      subject,
      grade
    };

    btn.classList.remove("bg-blue-300");

    btn.classList.add("bg-green-600");

    btn.innerHTML = `
      <div>${time}</div>
      <div>${subject}</div>
      <div>${grade}</div>
      <div style="font-size:9px;">SELECTED</div>
    `;

    resetSelection(selection);

    selection.classList.add("hidden");
  }
});

/* ======================================
   FORM SUBMIT
====================================== */

const form = document.getElementById("teacherForm");

const scheduleError =
  document.getElementById("scheduleError");

if (form) {

  form.addEventListener("submit", async (e) => {

    e.preventDefault();

    scheduleError.textContent = "";

    const mode =
      document.querySelector(
        'input[name="mode"]:checked'
      );

    if (!mode) {

      scheduleError.textContent =
        "Select teaching mode";

      return;
    }

    if (Object.keys(selectedSlots).length === 0) {

      scheduleError.textContent =
        "Select at least one slot";

      return;
    }

    const formData = new FormData(form);

    formData.append(
      "teachingMode",
      mode.value
    );

    formData.append(
      "schedule",
      JSON.stringify(selectedSlots)
    );

    try {

      const res = await fetch(
        `${API_BASE}/api/teachers`,
        {
          method: "POST",
          body: formData
        }
      );

      const data = await res.json();

      alert(data.message);

      form.reset();

      photoPreview?.classList.add("hidden");

      selectedSlots = {};

      loadReservedSlots();

    } catch (err) {

      console.error(err);

      alert("Server Error");
    }
  });
}

/* ======================================
   INIT
====================================== */

buildTable();

loadReservedSlots();
 // Mobile Menu
  const menuBtn = document.getElementById("menuBtn");
  const mobileMenu = document.getElementById("mobileMenu");

  if (menuBtn && mobileMenu) {

    menuBtn.addEventListener("click", () => {
      mobileMenu.classList.toggle("hidden");
    });

    mobileMenu.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", () => {
        mobileMenu.classList.add("hidden");
      });
    });
  }
</script>

</body>
</html>
